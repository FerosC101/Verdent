<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environmental Autopilot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-grid">
      <header class="glass topbar">
        <h1>Environmental Autopilot</h1>
        <div class="top-controls">
          <div class="map-switch" role="tablist" aria-label="Map mode switch">
            <button id="mode2d" class="map-mode active" aria-selected="true">2D Map</button>
            <button id="mode3d" class="map-mode" aria-selected="false">3D Map</button>
          </div>
        </div>
      </header>

      <aside class="glass panel left" id="overviewPanel">
        <div id="leftWidgetContent" class="widget-content"></div>
      </aside>

      <main class="glass map-wrap">
        <button id="filterToggle" class="filter-fab" aria-label="Open map filters">⛭</button>
        <div id="filterMenu" class="filter-menu" role="menu" aria-label="Map metric filter">
          <button class="filter-option active" data-filter="none" aria-selected="true">No Filter</button>
          <button class="filter-option" data-filter="temperature" aria-selected="false">Temperature</button>
          <button class="filter-option" data-filter="humidity" aria-selected="false">Humidity</button>
          <button class="filter-option" data-filter="crowd" aria-selected="false">Crowd Density</button>
          <button class="filter-option" data-filter="co2" aria-selected="false">Co2</button>
        </div>

        <aside class="glass legend-card" id="legendCard" aria-label="Map legend">
          <h3>Live Campus Status</h3>
          <div class="legend-list">
            <div class="legend-item"><span class="legend-dot safe"></span><span>Safe</span></div>
            <div class="legend-item"><span class="legend-dot moderate"></span><span>Moderate</span></div>
            <div class="legend-item"><span class="legend-dot critical"></span><span>Critical</span></div>
          </div>
        </aside>

        <div class="map-stage" aria-label="Campus map viewport">
          <div id="campusMap2D" class="map-layer"></div>
          <div id="campusMap3D" class="map-layer hidden"></div>
        </div>

      </main>

    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
  </body>
</html>
