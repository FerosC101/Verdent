<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BSU Alangilan 2D Campus Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
    />
    <link
      rel="stylesheet"
      href="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Mapbox token bootstrap (safe for git):
         Set once in DevTools: localStorage.setItem('MAPBOX_TOKEN','pk...')
    -->
    <script>
      (function () {
        const token = localStorage.getItem('MAPBOX_TOKEN') || '';
        const normalizedToken = String(token).trim();
        window.MAPBOX_TOKEN = window.MAPBOX_TOKEN || normalizedToken || '';
        if (!localStorage.getItem('MAPBOX_TOKEN') && normalizedToken) {
          localStorage.setItem('MAPBOX_TOKEN', normalizedToken);
        }
        if (!window.MAPBOX_TOKEN) {
          console.info('[Verdent] MAPBOX_TOKEN not set. Using fallback (non-Mapbox) 3D viewer.');
        } else {
          console.info('[Verdent] MAPBOX_TOKEN loaded from localStorage.');
        }
      })();
    </script>

    <div class="app-grid">
      <header class="glass topbar">
        <a class="brand" href="/" aria-label="Verdent home">
          <img class="brand-logo" src="assets/VERDENT%20Logo-green.png" alt="Verdent" />
        </a>
        <div class="top-controls">
          <div class="map-switch" role="tablist" aria-label="Map mode switch">
            <button id="mode2d" class="map-mode active" aria-selected="true">2D Map</button>
            <button id="mode3d" class="map-mode" aria-selected="false">3D Map</button>
          </div>
        </div>
      </header>

      <aside class="glass panel left" id="overviewPanel">
        <div id="leftWidgetContent" class="widget-content"></div>
      </aside>

      <main class="glass map-wrap">
        <aside class="glass ai-insights-widget" id="aiInsightsWidget" aria-label="AI insights">
          <div id="aiWidgetContent" class="widget-content"></div>
        </aside>
        <button id="aiWidgetShowBtn" class="ai-widget-show-btn" data-ui-action="show-ai-widget" aria-label="Show AI insights">AI Insights</button>

        <aside class="glass legend-card" id="legendCard" aria-label="Map legend">
          <h3>Live Campus Status</h3>
          <p class="legend-note">Heat index blends temperature, humidity, and airflow.</p>
          <div class="legend-list">
            <div class="legend-item"><span class="legend-dot safe"></span><span>Safe</span></div>
            <div class="legend-item"><span class="legend-dot moderate"></span><span>Moderate</span></div>
            <div class="legend-item"><span class="legend-dot critical"></span><span>Critical</span></div>
          </div>
        </aside>

        <div class="map-stage" aria-label="Campus map viewport">
          <div id="campusMap2D" class="map-layer"></div>
          <div id="campusMap3D" class="map-layer hidden"></div>
        </div>

      </main>

    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.js"></script>
    <script src="https://unpkg.com/three@0.146.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
